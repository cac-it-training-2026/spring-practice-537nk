Thyemeleaf
<hr>
<p>
<h4>訪れた場所一覧</h4>
<th:block th:unless="${'TODO'}">
	
訪れた場所の数:<span th:text="${'TODO'}"></span><br>

<table>
<tr >
<td>訪れた場所:</td>	
<td th:each="name:${'TODO'}" th:text="${'TODO'}"></td>
</tr>
</table>
<p th:if="${'TODO'}">旅行好きですね。</p>
</th:block>
<th:block th:if="${'TODO'}">
訪れた場所はありません。
</th:block>

</p>
